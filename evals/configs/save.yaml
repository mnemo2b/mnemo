description: "mnemo save — placement, routing, and update evals"

prompts:
  - "{{message}}"

providers:
  - id: "file://../providers/dispatch.ts"
    config:
      timeoutMs: 240000

# save spawns a sub-agent that does research + writes. guardrails are
# loose for now — tighten once named-agent + brief changes stabilize.
defaultTest:
  vars:
    fixture: "realistic"
  assert:
    - type: cost
      threshold: 1.00
      metric: cost_guardrail
      weight: 0.5
    - type: latency
      threshold: 210000
      metric: latency_guardrail
      weight: 0.5

tests:
  - file://../tests/save/placement.yaml
  - file://../tests/save/routing.yaml
  - file://../tests/save/update.yaml
