# placement — does the agent save to the right place when the brief is clear?
#
# clear placement should resolve to SAVED. willingness to create a new file
# (when content is novel but routing is obvious) is part of placement quality —
# the agent shouldn't punt on routine cases just because the file is new.

- description: "explicit destination — pasta water tips to cooking/techniques"
  vars:
    message: >
      Two pasta water tips from tonight's cooking — salt the water heavily,
      around 1 tablespoon per liter, and always reserve a cup of starchy
      water before draining for the sauce. Save these to cooking/techniques.
    prime: true
  assert:
    # mechanical — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # mechanical — the cooking/techniques area surfaced in tool inputs
    - type: javascript
      value: "output.tool_input_text.includes('cooking/techniques')"
      metric: reached_target
      weight: 2
    # filesystem — a non-AGENTS file under cooking/techniques was written
    # (either a new pasta-water note or an extension to an existing technique)
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => f.startsWith('notes/cooking/techniques/') && !f.endsWith('AGENTS.md')).length >= 1"
      metric: wrote_to_target_area
      weight: 3
    # qualitative — dispatcher confirmed the save rather than asking for clarification
    - type: llm-rubric
      value: |
        The reply confirms the save completed. Acceptable signals: "saved",
        "wrote", "created", "added to", "updated", reference to the target
        file, or narrating what went where. Unacceptable: asking where it
        should go, listing options for the user to pick, or declining to
        proceed because the exact file doesn't exist yet. Ignore any text
        about AGENTS.md or maintenance work.
      metric: committed_to_save
      weight: 2

- description: "novel topic, clear area — thai cooking history into cooking"
  vars:
    message: >
      Read about how Thai cooking evolved — Chinese influence brought
      noodle techniques in the 18th century, royal kitchen traditions
      shaped the layering of flavors, and rice anchors every meal as the
      foundation. Save a note on Thai cooking history.
    prime: true
  assert:
    # mechanical — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # mechanical — cooking area surfaced in tool inputs
    - type: javascript
      value: "output.tool_input_text.includes('cooking')"
      metric: reached_target
      weight: 2
    # filesystem — something got written under notes/cooking/ (new file most
    # likely, but an extension to an existing note is also valid). excludes
    # AGENTS.md since maintenance may bootstrap conventions docs.
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => f.startsWith('notes/cooking/') && !f.endsWith('AGENTS.md')).length >= 1"
      metric: wrote_to_target_area
      weight: 3
    # qualitative — dispatcher was willing to proceed rather than refusing on
    # "no existing file" grounds. SAVED or PROPOSAL are both acceptable here
    # (novel topic can merit either).
    - type: llm-rubric
      value: |
        The reply shows the dispatcher was willing to proceed — either by
        confirming a save to a new file, or by proposing one or more
        plausible destinations. Unacceptable: refusing because no matching
        file exists, claiming it can't determine where the content belongs
        when cooking is the obvious area, or returning an error-style
        response. Ignore any text about AGENTS.md or maintenance work.
      metric: willing_to_proceed
      weight: 2
