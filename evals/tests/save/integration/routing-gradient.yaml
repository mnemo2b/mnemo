# routing-gradient — does the agent calibrate confidence to ambiguity?
#
# routing.yaml asks "does the agent reason well at the midpoint?". this file
# asks "does confidence track ambiguity across multiple axes?". we sample
# three axes — each with a clear case and an ambiguous case — to build a
# calibration map rather than a calibration curve on a single dimension.
#
# axes:
#   1. cross-base   (notes/ vs research/)         — content classification
#   2. topic-project (notes/ vs projects/)        — shared vs scoped knowledge
#   3. cross-area   (within notes/ai/)            — which file in one area
#
# rubrics grade USER OUTCOMES, not agent process. the test is "can the user
# act on this response — trust the placement, or redirect cheaply?" not
# "did the agent use the right status verb / section heading / tool order".
# mechanical assertions (invoked_save, filesystem checks) are kept as
# low-weight regression sentinels, not correctness claims.
#
# where we have an opinion about which alternatives should be named on an
# ambiguous case, the rubric states it per-case. "address the competing
# file" is not shape-testing — it's specifying what the user needs to see
# to trust-or-redirect.

#=============================================================================
# axis 1 — cross-base (notes/ vs research/)
#=============================================================================

- description: "axis-1 clear notes — synthesized principle, no raw-source cue"
  vars:
    # already-articulated principle. no "reading", "paper", "saw" framing.
    # one clear destination, no competing alternative to surface.
    message: >
      Save this principle I've been working through: agent skills should be
      hub-and-spoke — stable knowledge in references, stateful trajectories
      in agents. The agent file is the orchestrator; references are loaded
      on demand.
    prime: true
  assert:
    # regression sentinel — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # outcome — destination under notes/ai/ appears in response or files
    - type: javascript
      value: |
        const created = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'));
        const inNotesAi = created.some(f => f.includes('notes/ai/'));
        const referencedNotesAi = output.tool_input_text.includes('notes/ai/');
        return inNotesAi || referencedNotesAi;
      metric: placement_correct
      weight: 3
    # outcome — nothing written outside notes/ai/
    - type: javascript
      value: |
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.includes('notes/ai/'));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: the user sent a synthesized principle with no
        raw-source cue. Expected experience: "I know where this went,
        I don't need to make a decision, I can move on."

        PASS when:
        - The response tells the user the content went to notes/ai/
          (existing file or new file, both fine)
        - The response reads as confident — the user is not asked to
          pick between options
        - The rationale (if offered) is grounded in the content (not
          "seems like a fit")

        FAIL when:
        - The user is handed a decision ("should this go to notes/ai/
          or research/ai/?") when the content clearly rules research out
        - Destination is outside notes/ai/
        - Agent fabricated content not in the brief

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_confident_placement
      weight: 3

- description: "axis-1 clear research — quoted source material with citations"
  vars:
    # explicit raw-source framing: "from the paper", quoted claim, citation.
    # one clear destination. no meaningful alternative to surface.
    message: >
      Save these extracts from the Constitutional AI paper (Bai et al, 2022).
      They propose a critique-and-revise loop where the model critiques its
      own output against a constitution, then revises. They report 75%
      preference for revised outputs in head-to-head with hh-rlhf baselines.
      Quote: "the model learns to critique its own behavior."
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const created = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'));
        const inResearchAi = created.some(f => f.includes('research/ai/'));
        const referencedResearchAi = output.tool_input_text.includes('research/ai/');
        return inResearchAi || referencedResearchAi;
      metric: placement_correct
      weight: 3
    - type: javascript
      value: |
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.includes('research/ai/'));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: source extracts with a citation and a quoted
        claim. The user's expected experience: "this landed where raw
        source belongs — I know I can find the paper reference later."

        PASS when:
        - The response tells the user the content went to research/ai/
        - The response doesn't hedge about notes/ai/ — the source framing
          rules it out, and the user doesn't need to weigh in
        - The rationale (if offered) references the raw-source signal

        FAIL when:
        - Routed to notes/ai/ (silently turning raw source into synthesized
          takeaway)
        - User is handed a research/ vs notes/ decision on clearly raw
          material
        - Rationale is absent or generic

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_confident_placement
      weight: 3

#=============================================================================
# axis 2 — topic vs project (notes/ vs projects/)
#=============================================================================

- description: "axis-2 clear topic — pure principle, no project context"
  vars:
    # principle stated in general terms. no project named. projects/ base
    # is wrong — no project to scope to. topic area is the right home.
    message: >
      Save this principle for local-first apps: treat sync as a derived
      layer, not a primary store. SQLite (or whatever local store) is the
      source of truth; the server is a relay for cross-device merge, not
      the canonical store.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const created = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'));
        const inTopic = created.some(f =>
          f.includes('notes/dev/') || f.includes('notes/ai/'));
        const referenced = output.tool_input_text.includes('notes/dev/')
          || output.tool_input_text.includes('notes/ai/');
        return inTopic || referenced;
      metric: placement_correct
      weight: 3
    - type: javascript
      value: |
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => f.includes('projects/') && !f.includes('notes/'));
        return wrong.length === 0;
      metric: no_project_placement
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: general principle, no project named. The
        user's expected experience: "topic note, no decision needed."

        PASS when:
        - The response tells the user the content went to a topic area
          under notes/ (notes/dev/ most likely, notes/ai/ defensible)
        - The response doesn't offer projects/ as an option — there's no
          project named, so that would be spurious

        FAIL when:
        - Routed to projects/*
        - User is handed a topic-vs-project decision when no project was
          named
        - Rationale is generic

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_confident_placement
      weight: 3

- description: "axis-2 clear project — recipe-app-specific implementation decision"
  vars:
    # named project, specific implementation choice, reasoning tied to
    # this app's data shape. clearly project-scoped.
    message: >
      Save this decision for recipe-app: the ingredient parser uses a
      regex-first heuristic with LLM fallback, not LLM-first. 90% of
      ingredient strings fit common shapes ("2 cups flour", "1 tbsp olive
      oil") and parse deterministically; the LLM is reserved for the long
      tail of weird formats.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const created = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'));
        const inRecipeApp = created.some(f => f.includes('projects/recipe-app/'));
        const referenced = output.tool_input_text.includes('projects/recipe-app/');
        return inRecipeApp || referenced;
      metric: placement_correct
      weight: 3
    - type: javascript
      value: |
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.includes('projects/recipe-app/'));
        return wrong.length === 0;
      metric: no_topic_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: named project, implementation-specific decision.
        The user's expected experience: "landed in the project where I'll
        go looking for it later."

        PASS when:
        - The response tells the user the content went to
          projects/recipe-app/
        - The response doesn't ask whether this belongs in a topic —
          the project scope is explicit in the brief

        FAIL when:
        - Routed to a topic area (losing the project context on a decision
          that only applies inside recipe-app)
        - User is handed a topic-vs-project decision when the project is
          explicitly named

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_confident_placement
      weight: 3

- description: "axis-2 ambiguous — project-context insight that generalizes"
  vars:
    # genuinely straddles. project-originated insight that the user
    # explicitly says generalizes. the competing bases are notes/ (topic)
    # and projects/recipe-app/ (scoped). user should see both addressed.
    message: >
      Save this insight from the recipe-app build: when local-first apps
      need to import remote content, treat the LLM as a parser, not a
      knowledge layer. The pattern generalizes beyond recipes — anywhere
      you're pulling structured data out of unstructured sources.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const created = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'));
        const target = created.some(f =>
          f.includes('notes/dev/') || f.includes('notes/ai/') ||
          f.includes('projects/recipe-app/'));
        const referenced = output.tool_input_text.includes('notes/dev/')
          || output.tool_input_text.includes('notes/ai/')
          || output.tool_input_text.includes('projects/recipe-app/');
        return target || referenced;
      metric: placement_acceptable
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: this insight has two legitimate homes —
        a topic under notes/ (for the reusable principle) and
        projects/recipe-app/ (for the project where it surfaced). The
        user's brief says both apply. Their expected experience: "I see
        which one the agent picked AND why the other wasn't — I can
        redirect with one reply if I disagree."

        PASS when ALL of the following hold:
        - The response tells the user where the content was saved or
          proposed
        - The response names or addresses BOTH competing homes (the
          topic destination AND projects/recipe-app/). Either destination
          is a defensible primary — what matters is that the other is
          visible to the user as an alternative they could redirect to.
        - The rationale explains the call in terms the user can verify
          (e.g. "the generalization lives here, the concrete application
          is already in the project README")

        FAIL when:
        - Silent commit — destination given but no mention of the other
          home. User has to guess whether the alternative was weighed.
        - Only a generic rationale ("fits better") without naming the
          competing path
        - Routed to a third destination (e.g. research/) without
          addressing the topic/project tension the user set up

        Ignore AGENTS.md / maintenance text.
      metric: user_can_redirect
      weight: 3

#=============================================================================
# axis 3 — cross-area within base (notes/ai/)
#=============================================================================

- description: "axis-3 clear — fits one existing file's gap unambiguously"
  vars:
    # specific prompting pattern with a clear file home —
    # notes/ai/prompting-patterns.md. no meaningful sibling has a claim.
    message: >
      Save this prompting pattern: XML tags around structured output
      sections produce better adherence than markdown headers when working
      with Claude. The model treats XML as a stricter structural signal.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const modified = output.files_modified.some(f => f.endsWith(target));
        const referenced = output.tool_input_text.includes(target);
        return modified || referenced;
      metric: placement_correct
      weight: 3
    # sibling edits under notes/ai/ are acceptable — contradiction-resolution
    # in a neighboring file is desired behavior on a clear save. what we
    # guard against is placement OUTSIDE the target area.
    - type: javascript
      value: |
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.includes('notes/ai/'));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: specific prompting pattern. One clear file home
        (notes/ai/prompting-patterns.md). User's expected experience:
        "landed in the right file, no options presented." A secondary
        edit to a sibling file is fine (contradiction resolution,
        cross-reference updates) as long as the response surfaces it.

        PASS when:
        - The response tells the user the content went to
          notes/ai/prompting-patterns.md
        - The response doesn't waffle between sibling files — there's no
          real ambiguity to surface

        FAIL when:
        - Routed to a different file (losing the obvious home)
        - User is handed a decision between sibling files that don't have
          a claim on this content

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_confident_placement
      weight: 3

- description: "axis-3 ambiguous — self-critique straddles prompting and agent-design"
  vars:
    # the insight is "self-critique in agent loops catches confident-wrong
    # actions". two strong candidates sit in notes/ai/:
    #   - prompting-patterns.md (Reasoning → "Self-critique" bullet)
    #   - agent-design.md (Mitigations → "Self-evaluation pass before
    #     'done'", Failure modes → "Confident wrong actions")
    # prompting-patterns frames it as a prompt technique; agent-design
    # frames it as a loop mitigation. a careful reader could land in
    # either with justification. the user should see both addressed.
    #
    # this case also probes within-area discovery: if the agent silent-
    # commits to one file without mentioning the sibling, it likely
    # never listed notes/ai/ or read both files before committing.
    #
    # the brief-shape assertions below probe the dispatcher layer directly:
    # on this structurally ambiguous content, the dispatcher should pass
    # `Candidates:` with ≥2 plausible files, not pre-commit via `Suggested:`
    # or `Specified:`. `Specified:` is reserved for cases where the user
    # literally named a path — inferred destinations are never Specified.
    message: >
      Save this: adding a self-critique step to agent loops catches
      confident-wrong actions before they ship. The agent reviews its
      own plan, flags what could be wrong, then either revises or
      proceeds. Small cost in latency, meaningful drop in bad actions.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # brief-shape — dispatcher framed routing as Candidates (plural)
    # rather than pre-committing via Suggested or Specified
    - type: javascript
      value: "(output.agent_prompts[0] || '').includes('Candidates:')"
      metric: chose_candidates_signal
      weight: 3
    # brief-shape — dispatcher did NOT pre-commit to a single destination.
    # both `Suggested:` and `Specified:` hide alternatives; on structurally
    # ambiguous content, Candidates is the only correct shape.
    - type: javascript
      value: |
        const brief = output.agent_prompts[0] || '';
        return !brief.includes('Suggested:') && !brief.includes('Specified:');
      metric: avoided_premature_commitment
      weight: 3
    # brief-shape — Candidates line names agent-design.md (primary anchor)
    # plus at least one plausible alternative. we prefer "more loose
    # candidates" over "fewer strict candidates" — cross-base alternatives
    # are fine even when weaker than in-base siblings.
    - type: javascript
      value: |
        const prompt = output.agent_prompts[0] || '';
        const candLine = prompt.split('\n').find(l => l.startsWith('Candidates:')) || '';
        const hasAnchor = candLine.includes('agent-design');
        const alts = ['prompting-patterns', 'agent-memory'];
        const hasAlt = alts.some(a => candLine.includes(a));
        return hasAnchor && hasAlt;
      metric: anchor_plus_alt_named
      weight: 3
    - type: javascript
      value: |
        const targets = ['notes/ai/prompting-patterns.md', 'notes/ai/agent-design.md'];
        const modified = output.files_modified.some(f =>
          targets.some(t => f.endsWith(t)));
        const referenced = targets.some(t => output.tool_input_text.includes(t));
        return modified || referenced;
      metric: placement_acceptable
      weight: 3
    - type: javascript
      value: |
        const ok = ['notes/ai/prompting-patterns.md', 'notes/ai/agent-design.md'];
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !ok.some(t => f.endsWith(t)));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: the insight sits at the intersection of two
        files — notes/ai/prompting-patterns.md (self-critique as a
        prompting technique, already listed under Reasoning) and
        notes/ai/agent-design.md (self-evaluation as a loop mitigation,
        already listed under Mitigations; also directly addresses the
        "confident wrong actions" failure mode named in that file).

        The user's expected experience: "I see which file the agent
        picked, AND that the other was considered — I can redirect
        with one word if I disagree."

        This case has a specific claim: BOTH agent-design.md AND
        prompting-patterns.md should be visible to the user. One as
        the destination, the other as an addressed alternative. A
        response that names only one leaves the user unable to tell
        whether the second was weighed or missed entirely.

        PASS when:
        - The response tells the user where the content was saved or
          proposed
        - Both notes/ai/agent-design.md and notes/ai/prompting-patterns.md
          are visible in the response — one as destination, the other as
          addressed alternative (named as considered, or explained away)
        - The rationale justifies the call on content grounds (references
          self-critique, the loop context, or the confident-wrong-actions
          link — not generic "fits better")

        FAIL when:
        - Only one of the two files appears in the response (user can't
          tell whether the other was considered)
        - Silent commit with generic rationale
        - Routed to a third file (e.g. context-engineering.md, evals.md)
          without addressing the two strong candidates
        - A different alternative is named (e.g. research/ai/) but the
          other notes/ai/ sibling is never mentioned — the user is left
          uncertain about the file they'd actually open next

        Ignore AGENTS.md / maintenance text.
      metric: user_can_redirect
      weight: 3
