# placement — does the agent save to the right place when the brief is clear?
#
# rubrics grade USER OUTCOMES, not agent process. mechanical assertions stay
# as low-weight regression sentinels. the question these cases ask is: when
# the user's request is unambiguous, does the response confirm the save and
# land it in the right area — including being willing to create a new file
# when the area is obvious but a matching one doesn't yet exist.

- description: "explicit destination — pasta water tips to cooking/techniques"
  vars:
    message: >
      Two pasta water tips from tonight's cooking — salt the water heavily,
      around 1 tablespoon per liter, and always reserve a cup of starchy
      water before draining for the sauce. Save these to cooking/techniques.
    prime: true
  assert:
    # regression sentinel — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # brief-shape — dispatcher used the Specified label because the user
    # named a path ("cooking/techniques") in their message. this is the
    # happy-path counterpart to the anti-fabrication checks on ambiguous
    # content: Specified must be reachable when the quote-test actually
    # finds a path in User said.
    - type: javascript
      value: "(output.agent_prompts[0] || '').includes('Specified:')"
      metric: used_specified_signal
      weight: 3
    # outcome — destination appears in response (user knows where it went)
    - type: javascript
      value: "output.tool_input_text.includes('cooking/techniques')"
      metric: destination_surfaced
      weight: 2
    # outcome — something was actually written under the target area
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => f.startsWith('notes/cooking/techniques/') && !f.endsWith('AGENTS.md')).length >= 1"
      metric: wrote_to_target_area
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: explicit destination in the brief
        ("cooking/techniques"). User's expected experience: "saved
        exactly where I told it to go, no questions asked."

        PASS when:
        - The response tells the user the content was saved (or added
          to, extended, created) — user knows it completed
        - The destination named is cooking/techniques (user's requested
          area)

        FAIL when:
        - The agent asks where to save (user already said)
        - The agent offers a list of options for the user to pick
        - The agent declines because a specific matching file doesn't
          exist (creating a new one is fine)

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_save_confirmation
      weight: 2

- description: "novel topic, clear area — thai cooking history into cooking"
  vars:
    message: >
      Read about how Thai cooking evolved — Chinese influence brought
      noodle techniques in the 18th century, royal kitchen traditions
      shaped the layering of flavors, and rice anchors every meal as the
      foundation. Save a note on Thai cooking history.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: "output.tool_input_text.includes('cooking')"
      metric: destination_surfaced
      weight: 2
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => f.startsWith('notes/cooking/') && !f.endsWith('AGENTS.md')).length >= 1"
      metric: wrote_to_target_area
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: clear topic area (cooking), novel subject
        (Thai history). User's expected experience: "the agent took the
        content and landed it under cooking — either a new note or
        extended an existing one. I didn't have to decide where it went."

        PASS when:
        - The response confirms the save (or proposes a specific
          placement) under notes/cooking/
        - The agent was willing to proceed — either creating a new file
          for a novel topic, or extending an existing one

        FAIL when:
        - The agent refused on "no matching file exists" grounds
        - The agent claimed it couldn't determine where the content
          belongs (cooking is explicit)
        - Error-style response that leaves the user with nothing saved
          and no path forward

        Ignore AGENTS.md / maintenance text.
      metric: user_gets_progress
      weight: 2
