# routing — does the agent reason well about destination when the area is ambiguous?
#
# rubrics grade USER OUTCOMES, not agent process. "can the user trust the
# placement or redirect cheaply?" is the test, not "did the agent use a
# specific status verb or visit specific files during research". mechanical
# assertions stay as low-weight regression sentinels.
#
# the second case (vague brief) is structurally different — content is
# missing, so the user outcome is "got asked what I meant before anything
# was written".

- description: "ambiguous area — prompt engineering reading session insight"
  vars:
    # two competing signals in the brief:
    #   1. content classification — "insight" + already-articulated reasoning →
    #      synthesized, fits notes/ over research/
    #   2. framing trigger — "reading session" → research/ ambiguity signal
    # we have an opinion: notes/ai/prompting-patterns.md is the right home
    # (there's an existing CoT bullet with a mechanism-shaped gap). user
    # should see that file as the destination and research/ai/ addressed
    # as the alternative that "reading session" gestured at.
    message: >
      Insight from a prompt engineering reading session — chain-of-thought
      works because it surfaces intermediate reasoning that the model would
      otherwise compress. Asking the model to "think step by step" is
      essentially a request for that hidden reasoning, made explicit. Save
      this note about prompt engineering.
    prime: true
  assert:
    # regression sentinel — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # regression sentinel — both bases surfaced somewhere in trajectory.
    # accepts either the area path or the base AGENTS.md — reading the
    # base-level doc is sufficient to rule a base in or out.
    - type: javascript
      value: |
        const sawNotes = output.tool_input_text.includes('notes/ai') || output.tool_input_text.includes('notes/AGENTS.md');
        const sawResearch = output.tool_input_text.includes('research/ai') || output.tool_input_text.includes('research/AGENTS.md');
        return sawNotes && sawResearch;
      metric: explored_both_bases
      weight: 2
    # outcome — the destination file surfaced in the response
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const modified = output.files_modified.some(f => f.endsWith(target));
        const referenced = output.tool_input_text.includes(target);
        return modified || referenced;
      metric: placement_correct
      weight: 3
    # outcome — nothing wrong got written
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.endsWith(target));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: the brief has mixed signals (synthesized
        content + "reading session" framing). We have an opinion about
        the right home: notes/ai/prompting-patterns.md — it already has
        a CoT bullet without a mechanism, and this insight fills that
        gap. The user's expected experience: "I see it landed in
        prompting-patterns.md, I understand why (the existing CoT
        entry), and if the 'reading session' framing suggested
        research/ai/ to me, I see that was considered and ruled out."

        PASS when:
        - The response tells the user the content was saved or proposed
          to notes/ai/prompting-patterns.md
        - The rationale names something concrete — the existing CoT
          entry, the synthesized-vs-raw-source distinction, or similar
          content-grounded reasoning
        - The research/ base is addressed in some form (named as
          considered, or its absence explained) so the user isn't left
          wondering about the "reading session" signal

        FAIL when:
        - Routed somewhere other than notes/ai/prompting-patterns.md
        - Silent commit with generic rationale ("fits here")
        - research/ai/ was never addressed — user is left wondering
          whether the "reading session" signal was weighed
        - Agent fabricated content not in the user's brief

        Ignore AGENTS.md / maintenance text.
      metric: user_can_trust_placement
      weight: 3

- description: "vague brief — 'python' fits multiple unrelated areas"
  vars:
    # 'python' could mean ball pythons (notes/pets/python), the language
    # (notes/dev/python), research (research/ai or research/nutrition's
    # python-snake-diet). with no content, the user outcome is "got
    # asked which topic I meant before anything was written".
    message: "Save what we discussed about python."
    prime: true
  assert:
    # outcome — user received a question
    - type: javascript
      value: "output.result.includes('?')"
      metric: asked_clarifying_question
      weight: 2
    # outcome — no phantom save happened
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => !f.endsWith('AGENTS.md')).length === 0"
      metric: no_phantom_save
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: vague brief, no content. The user's expected
        experience: "got asked what I meant, nothing was written, I
        haven't had to clean anything up."

        PASS when:
        - The reply asks for clarification about which "python" the
          user meant, or what content to save, or where to save it
        - Candidate areas may be listed for the user to pick from

        FAIL when:
        - A save was confirmed (on content the user didn't actually
          provide)
        - The agent fabricated python content
        - The agent confidently picked a destination without asking

        Ignore AGENTS.md / maintenance text.
      metric: user_got_clarification
      weight: 2
