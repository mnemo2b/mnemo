# routing — does the agent reason well about destination when the area is ambiguous?
#
# rubrics grade USER OUTCOMES, not agent process. "can the user trust the
# placement or redirect cheaply?" is the test, not "did the agent use a
# specific status verb or visit specific files during research". mechanical
# assertions stay as low-weight regression sentinels.
#
# the second case (vague brief) is structurally different — content is
# missing, so the user outcome is "got asked what I meant before anything
# was written".

- description: "reading-session insight — synthesized principle with origin context"
  vars:
    # "insight from a reading session" is synthesis, not raw extract. the
    # mechanism ("because it surfaces intermediate reasoning") is already
    # articulated in the user's voice. research/ is for structured research
    # outputs (tool landscapes, product comparisons, competitive research),
    # not for every mention of "reading". so research/ is not a candidate
    # here — the right home is notes/ai/prompting-patterns.md, where an
    # existing CoT bullet has a mechanism-shaped gap.
    message: >
      Insight from a prompt engineering reading session — chain-of-thought
      works because it surfaces intermediate reasoning that the model would
      otherwise compress. Asking the model to "think step by step" is
      essentially a request for that hidden reasoning, made explicit. Save
      this note about prompt engineering.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const modified = output.files_modified.some(f => f.endsWith(target));
        const referenced = output.tool_input_text.includes(target);
        return modified || referenced;
      metric: placement_correct
      weight: 3
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.endsWith(target));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: synthesized principle with origin context
        ("from a reading session"). Right home is
        notes/ai/prompting-patterns.md — the existing CoT bullet has a
        mechanism-shaped gap this fills. The user's expected experience:
        "landed in prompting-patterns.md, rationale referenced the
        existing CoT entry or the synthesized framing — I know why."

        PASS when:
        - The response tells the user the content went to
          notes/ai/prompting-patterns.md
        - The rationale names something concrete — the existing CoT
          entry, the synthesis framing, or similar content-grounded
          reasoning

        FAIL when:
        - Routed somewhere other than notes/ai/prompting-patterns.md
        - Silent commit with generic rationale ("fits here")
        - Agent fabricated content not in the user's brief

        Ignore AGENTS.md / maintenance text.
      metric: user_can_trust_placement
      weight: 3

- description: "cross-base ambiguous — researched landscape with distilled pattern"
  vars:
    # models the user's actual research workflow: they research a subject
    # (tool landscape, competitive analysis, SaaS comparison) and produce
    # BOTH a structured landscape AND a distilled cross-cutting pattern.
    # the landscape fits research/ai/llm-evaluation.md (research base is
    # for research deliverables). the distilled pattern fits
    # notes/ai/evals.md (synthesized principle). both bases have a real
    # claim — Candidates should name both, and the response should
    # address the choice so the user can redirect cheaply.
    message: >
      Spent the morning researching agent evaluation tools — DeepEval does
      pytest-style assertions, Promptfoo does matrix-style grids, Inspect
      AI is constitution-driven. The common pattern across all three: eval
      frameworks are moving away from single-score rubrics toward
      per-assertion grading. Save this.
    prime: true
  assert:
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # brief-shape — dispatcher framed routing as Candidates (plural)
    - type: javascript
      value: "(output.agent_prompts[0] || '').includes('Candidates:')"
      metric: chose_candidates_signal
      weight: 3
    # brief-shape — Candidates block spans both bases (notes/ and research/)
    - type: javascript
      value: |
        const prompt = output.agent_prompts[0] || '';
        const match = prompt.match(/\nCandidates:\n((?:[ \t]+.*\n?)+)/);
        const candBlock = match ? match[1] : '';
        return candBlock.includes('notes/') && candBlock.includes('research/');
      metric: cross_base_candidates_named
      weight: 3
    # brief-shape — per-candidate cuts present (v0.8 cuts-as-hypothesis)
    - type: javascript
      value: |
        const prompt = output.agent_prompts[0] || '';
        const match = prompt.match(/\nCandidates:\n((?:[ \t]+.*\n?)+)/);
        const candBlock = match ? match[1] : '';
        return candBlock.includes('covers:');
      metric: per_candidate_cuts_present
      weight: 2
    # outcome — destination landed in one of the two legitimate homes
    - type: javascript
      value: |
        const ok = ['notes/ai/evals.md', 'research/ai/llm-evaluation.md'];
        const landed = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .some(f => ok.some(t => f.endsWith(t)));
        const referenced = ok.some(t => output.tool_input_text.includes(t));
        return landed || referenced;
      metric: placement_acceptable
      weight: 3
    - type: javascript
      value: |
        const ok = ['notes/ai/evals.md', 'research/ai/llm-evaluation.md'];
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !ok.some(t => f.endsWith(t)));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    - type: llm-rubric
      value: |
        User outcome test: the user did research and produced both a
        structured landscape (three tools with distinguishing features)
        and a distilled cross-tool pattern. Both bases have a real
        claim — research/ai/llm-evaluation.md for the landscape,
        notes/ai/evals.md for the synthesized pattern. The user's
        expected experience: "I see which base the agent picked AND
        that the other base was considered — I can redirect with one
        reply if I want the other frame."

        PASS when ALL hold:
        - The response tells the user where the content was saved or
          proposed (research/ai/llm-evaluation.md or notes/ai/evals.md
          — either is defensible as the primary)
        - Both bases are visible in the response — one as destination,
          the other as addressed alternative (named as considered, or
          explained away)
        - The rationale explains the call on content grounds (the
          landscape framing, the distilled pattern, or a clear reason
          to favor one framing over the other)

        FAIL when:
        - Only one base appears in the response (user can't tell
          whether the other was considered)
        - Silent commit with generic rationale
        - Routed somewhere other than the two acceptable homes
        - Agent fabricated content not in the user's brief

        Ignore AGENTS.md / maintenance text.
      metric: user_can_redirect
      weight: 3

- description: "vague brief — 'python' fits multiple unrelated areas"
  vars:
    # 'python' could mean ball pythons (notes/pets/python), the language
    # (notes/dev/python), research (research/ai or research/nutrition's
    # python-snake-diet). with no content, the user outcome is "got
    # asked which topic I meant before anything was written".
    message: "Save what we discussed about python."
    prime: true
  assert:
    # outcome — user received a question
    - type: javascript
      value: "output.result.includes('?')"
      metric: asked_clarifying_question
      weight: 2
    # outcome — no phantom save happened
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => !f.endsWith('AGENTS.md')).length === 0"
      metric: no_phantom_save
      weight: 3
    - type: llm-rubric
      value: |
        User outcome test: vague brief, no content. The user's expected
        experience: "got asked what I meant, nothing was written, I
        haven't had to clean anything up."

        PASS when:
        - The reply asks for clarification about which "python" the
          user meant, or what content to save, or where to save it
        - Candidate areas may be listed for the user to pick from

        FAIL when:
        - A save was confirmed (on content the user didn't actually
          provide)
        - The agent fabricated python content
        - The agent confidently picked a destination without asking

        Ignore AGENTS.md / maintenance text.
      metric: user_got_clarification
      weight: 2
