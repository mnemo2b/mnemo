# signal-choice — does the dispatcher pick the right destination signal?
#
# the skill reference describes three signals the dispatcher can pass to
# the save agent:
#   Specified: user named a path in their words     — instruction-strength
#   Suggested: dispatcher inferred with confidence  — soft prior
#   Candidates: dispatcher saw multiple plausible   — invite agent to choose
#
# the failure these probes catch: on structurally ambiguous content, the
# dispatcher pre-commits to `Suggested` from prime context and hides
# alternatives the save agent would otherwise surface. this is the
# dispatcher-layer half of the axis-3 failure in integration — split here
# so we can see which layer regresses when it does.
#
# dispatch.ts exposes every sub-agent invocation's prompt as
# `output.agent_prompts[]`. assertions look at agent_prompts[0] directly.

- description: "ambiguous self-critique — dispatcher should choose Candidates, not Suggested"
  vars:
    # same content as the axis-3 ambiguous integration case — the insight
    # straddles notes/ai/prompting-patterns.md (self-critique as prompting
    # technique) and notes/ai/agent-design.md (self-evaluation as loop
    # mitigation + addresses "confident wrong actions"). both files have a
    # structural claim from prime context. the dispatcher should recognize
    # this straddle and pass Candidates rather than picking one as Suggested.
    message: >
      Save this: adding a self-critique step to agent loops catches
      confident-wrong actions before they ship. The agent reviews its
      own plan, flags what could be wrong, then either revises or
      proceeds. Small cost in latency, meaningful drop in bad actions.
    prime: true
  assert:
    # regression sentinel — a sub-agent was actually invoked
    - type: javascript
      value: "output.agent_prompts.length > 0"
      metric: invoked_save
      weight: 1
    # outcome — the dispatcher framed the routing as Candidates (plural)
    # rather than Suggested (one pre-committed pick)
    - type: javascript
      value: "output.agent_prompts[0].includes('Candidates:')"
      metric: chose_candidates_signal
      weight: 3
    # outcome — the dispatcher did NOT pre-commit to a single destination
    # via either `Suggested:` or `Specified:`. both labels hide alternatives;
    # on structurally ambiguous content, Candidates is the only correct shape.
    # (a missing-assertion bug version of this metric passed when the dispatcher
    # used `Specified:` on inferred content — caught by widening the check.)
    - type: javascript
      value: |
        const brief = output.agent_prompts[0] || '';
        return !brief.includes('Suggested:') && !brief.includes('Specified:');
      metric: avoided_premature_commitment
      weight: 3
    # outcome — the Candidates line names ≥2 files including agent-design.md
    # (the primary anchor) plus at least one plausible alternative. we prefer
    # "more loose candidates" over "fewer strict candidates" — a dispatcher
    # that reaches across bases to list a broader plausible set is doing the
    # right thing structurally, even if the specific alt differs from the
    # in-base sibling we first had in mind.
    - type: javascript
      value: |
        const prompt = output.agent_prompts[0] || '';
        const candLine = prompt.split('\n').find(l => l.startsWith('Candidates:')) || '';
        const hasAnchor = candLine.includes('agent-design');
        const alts = ['prompting-patterns', 'agent-memory'];
        const hasAlt = alts.some(a => candLine.includes(a));
        return hasAnchor && hasAlt;
      metric: anchor_plus_alt_named
      weight: 3
    - type: llm-rubric
      value: |
        Dispatcher probe: the user sent content that structurally straddles
        two files in notes/ai/ — prompting-patterns.md (where self-critique
        is already a Reasoning bullet) and agent-design.md (where
        self-evaluation is a loop mitigation and confident-wrong-actions
        is a named failure mode).

        The skill reference tells the dispatcher: "If you see multiple
        plausible homes, use Candidates and let the save agent pick from
        them. Pre-committing Suggested on ambiguous content looks decisive
        but produces silent misplacements." `Specified` is reserved for
        cases where the user literally named a path in their words — an
        inferred destination is never `Specified`, no matter how confident
        the dispatcher is.

        The brief the dispatcher constructs for the sub-agent should:
        - frame the routing as Candidates (NOT Suggested, NOT Specified),
          because neither file dominates on content terms and the user did
          not name a path
        - name notes/ai/agent-design.md as one of the candidates (it is the
          clearest structural anchor — self-evaluation is already a loop
          mitigation there and confident-wrong-actions is a named failure
          mode), plus at least one plausible alternative. Reasonable
          alternatives include notes/ai/prompting-patterns.md (where
          self-critique sits as a Reasoning bullet) and research/ai/
          agent-memory.md (where agent behavior and self-correction
          mechanisms live). Listing all three is better than listing two —
          we prefer loose recommendations over missing ones.
        - preserve the user's own phrasing in the Brief section — the
          dispatcher is distilling, not paraphrasing

        PASS when the brief frames destination as Candidates with
        agent-design.md plus at least one plausible alternative, and
        preserves the user's content.

        FAIL when the dispatcher pre-commits to one file via Suggested or
        Specified (either label hides alternatives), or names only one
        file in Candidates (hides all alternatives), or fabricates
        content not in the user's message.

        Ignore anything outside the brief (maintenance invocations, etc).
      metric: dispatcher_frames_ambiguity_correctly
      weight: 3
