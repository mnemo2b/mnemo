# update — does the agent extend an existing note instead of creating a duplicate?
#
# the strongest failure mode for save is silently creating a parallel file
# next to one that already covers the topic. the agent should recognize the
# existing file as the right home and propose an edit, not a new creation.

- description: "refinement to existing — braising aromatic timing extends braising.md"
  vars:
    # cooking/techniques/braising.md exists in the fixture. the brief is a
    # refinement on the existing technique, not a new technique. the agent
    # should target the existing file.
    message: >
      Quick refinement to my braising technique — adding aromatics in two
      stages (first round before the liquid goes in, second round halfway
      through the cook) gives a cleaner layered flavor than dumping them
      all in at the start. Save this refinement to the braising notes.
    prime: true
  assert:
    # mechanical — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # mechanical — the braising file surfaced in tool inputs (research or write)
    - type: javascript
      value: "output.tool_input_text.includes('braising')"
      metric: reached_target_file
      weight: 2
    # filesystem — existing braising.md was modified on disk
    - type: javascript
      value: "output.files_modified.includes('notes/cooking/techniques/braising.md')"
      metric: updated_existing_file
      weight: 3
    # filesystem — no sibling technique file was created (AGENTS.md is allowed
    # since the maintenance agent may bootstrap conventions docs)
    - type: javascript
      value: "output.files_created.filter(f => f.startsWith('notes/cooking/techniques/') && !f.endsWith('AGENTS.md')).length === 0"
      metric: no_duplicate_creation
      weight: 2
    # qualitative — dispatcher's reply framed the save as an update, not a
    # new file. tolerant of any valid phrasing (extended, integrated,
    # added to, merged, etc.) — that's why it's a rubric, not a regex.
    - type: llm-rubric
      value: |
        The reply clearly communicates that the save extended or updated an
        existing note rather than creating a new file. Acceptable signals
        include phrases like "saved to [existing file]", "integrated into",
        "added to", "extended", "updated", "merged into". Unacceptable:
        announcing a newly created sibling file (e.g. braising-aromatics.md),
        or language that implies the refinement lives in a fresh note.
        Ignore any text about AGENTS.md or maintenance work — that is a
        separate concern and should not affect this judgment.
      metric: framed_as_update
      weight: 2
