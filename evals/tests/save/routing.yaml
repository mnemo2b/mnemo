# routing — does the agent pick the right confidence level when placement is unclear?
#
# ambiguity comes in two flavors: multiple plausible destinations (PROPOSAL),
# or not enough information to decide (NEEDS_CONTEXT). conflating these is a
# routing failure even if the final placement is reasonable.

- description: "ambiguous area — prompt engineering fits notes/ai or research/ai"
  vars:
    # both notes/ai/prompting-patterns.md and research/ai/prompt-injection.md
    # exist — chain-of-thought content could plausibly extend either or warrant
    # a new file in either area. proper response is a proposal, not a silent pick.
    message: >
      Insight from a prompt engineering reading session — chain-of-thought
      works because it surfaces intermediate reasoning that the model would
      otherwise compress. Asking the model to "think step by step" is
      essentially a request for that hidden reasoning, made explicit. Save
      this note about prompt engineering.
    prime: true
  assert:
    # mechanical — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # mechanical — both plausible areas should surface in the trajectory
    - type: javascript
      value: "output.tool_input_text.includes('notes/ai') && output.tool_input_text.includes('research/ai')"
      metric: explored_both_areas
      weight: 2
    # filesystem — no content file should have been written (waiting for the
    # user to pick). AGENTS.md changes are maintenance and don't count.
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => !f.endsWith('AGENTS.md')).length === 0"
      metric: no_silent_save
      weight: 3
    # qualitative — dispatcher presented placement options rather than picking one
    - type: llm-rubric
      value: |
        The reply presents multiple plausible destinations and asks the user
        to choose, or otherwise communicates a proposal. Acceptable signals:
        listing two or more options, phrases like "could go in X or Y",
        "either...or", "which would you prefer", "proposal", "options".
        Unacceptable: announcing a completed save, silently picking one
        destination, or refusing to engage. Ignore any text about AGENTS.md
        or maintenance work.
      metric: status_proposal
      weight: 2

- description: "vague brief — 'python' fits multiple unrelated areas"
  vars:
    # 'python' could mean ball pythons (notes/pets/python), the language
    # (notes/dev/python), python research (research/ai or research/nutrition's
    # python-snake-diet). with no content, the agent must ask before doing anything.
    message: "Save what we discussed about python."
    prime: true
  assert:
    # mechanical — dispatcher asked a question (string contains '?')
    - type: javascript
      value: "output.result.includes('?')"
      metric: asked_clarifying_question
      weight: 2
    # filesystem — nothing was written. strongest signal for "no phantom save"
    # since we can check the fixture state directly instead of hoping the
    # dispatcher's reply happens to mention (or not mention) a file.
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => !f.endsWith('AGENTS.md')).length === 0"
      metric: no_phantom_save
      weight: 3
    # qualitative — dispatcher asked for clarification about what/where to save
    - type: llm-rubric
      value: |
        The reply asks the user to clarify — either about which topic
        "python" refers to (the language, the pet snake, research notes),
        where it should be saved, or what content to save. Acceptable
        signals: explicit questions, "which", "could you tell me", "need
        more info", listing candidate areas. Unacceptable: confirming a
        save happened, fabricating python content, or confidently picking
        a destination without asking. Ignore any text about AGENTS.md or
        maintenance work.
      metric: status_needs_context
      weight: 2
