# routing — does the agent reason well about destination when the area is ambiguous?
#
# the question this file asks is NOT "did the agent pick the same verb every
# time" (SAVED vs PROPOSAL). it's "did the agent reason well about where the
# content belongs". placement and confidence are graded separately:
#
#   - placement: deterministic. the right destination is the right destination
#     regardless of whether the agent committed (SAVED) or proposed (PROPOSAL).
#   - confidence: qualitative. either verb passes if the rationale holds up.
#     SAVED is sound when the agent rules out alternatives explicitly. PROPOSAL
#     is sound when the agent surfaces ambiguity and defers to the user.
#
# variance across runs is informative, not a failure mode — the agent is
# exercising judgment under genuine ambiguity. consistency is tracked via
# `--repeat N --no-cache` as data, not as a pass/fail gate.
#
# the second case (vague brief) is structurally different — content is missing,
# so NEEDS_CONTEXT is the only sound response. it's not a placement test.

- description: "ambiguous area — prompt engineering reading session insight"
  vars:
    # the user's framing has two competing signals:
    #   1. content classification — "insight" + already-articulated reasoning →
    #      synthesized, fits notes/ over research/
    #   2. framing trigger — "reading session" → research/ ambiguity signal
    # both notes/ai/prompting-patterns.md (with a bare CoT bullet) and
    # research/ai/ exist. the right destination is notes/ai/prompting-patterns.md
    # — the existing CoT bullet has a clear gap this insight fills.
    # the agent may SAVE confidently or PROPOSE cautiously; both are sound.
    message: >
      Insight from a prompt engineering reading session — chain-of-thought
      works because it surfaces intermediate reasoning that the model would
      otherwise compress. Asking the model to "think step by step" is
      essentially a request for that hidden reasoning, made explicit. Save
      this note about prompt engineering.
    prime: true
  assert:
    # mechanical — save sub-agent was invoked
    - type: javascript
      value: "output.tool_input_text.includes('subagent_type')"
      metric: invoked_save
      weight: 1
    # mechanical — agent looked at both bases. checks for either the area
    # path (research/ai) OR the base AGENTS.md (research/AGENTS.md). reading
    # the base-level AGENTS.md is sufficient — if its content rules out the
    # base, drilling into the area is unnecessary.
    - type: javascript
      value: |
        const sawNotes = output.tool_input_text.includes('notes/ai') || output.tool_input_text.includes('notes/AGENTS.md');
        const sawResearch = output.tool_input_text.includes('research/ai') || output.tool_input_text.includes('research/AGENTS.md');
        return sawNotes && sawResearch;
      metric: explored_both_bases
      weight: 2
    # PLACEMENT — the right destination is notes/ai/prompting-patterns.md.
    # the agent passes whether it SAVED (file modified) or PROPOSED (path
    # mentioned in the trajectory as the recommendation).
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const modified = output.files_modified.some(f => f.endsWith(target));
        const referenced = output.tool_input_text.includes(target);
        return modified || referenced;
      metric: placement_correct
      weight: 3
    # PLACEMENT NEGATIVE — no wrong file was written. AGENTS.md changes are
    # maintenance and excluded. modifications to the target file are fine.
    - type: javascript
      value: |
        const target = 'notes/ai/prompting-patterns.md';
        const wrong = [...output.files_created, ...output.files_modified]
          .filter(f => !f.endsWith('AGENTS.md'))
          .filter(f => !f.endsWith(target));
        return wrong.length === 0;
      metric: no_wrong_placement
      weight: 2
    # CONFIDENCE — grades reasoning quality, not verb shape. accepts either
    # SAVED or PROPOSAL when the rationale is coherent. the grader looks at
    # the full trajectory (tool_calls / tool_input_text), not just the
    # dispatcher's final text — maintenance announcements often crowd out
    # the save acknowledgment in the trailing message.
    - type: llm-rubric
      value: |
        Examine the save sub-agent's reasoning in the trajectory (tool_calls
        and tool_input_text fields, especially the Status: SAVED or Status:
        PROPOSAL block returned by the mnemo-save sub-agent). Grade the
        routing reasoning, not the verb chosen.

        PASS when ALL of the following hold:
        - The agent considered both notes/ and research/ as candidate bases.
          this can be shown by EITHER explicit articulation in the status
          block OR observable behavior in tool_calls (reading both
          notes/AGENTS.md and research/AGENTS.md, or paths under both bases).
        - The destination chosen or recommended is notes/ai/prompting-patterns.md
        - The rationale explains why this destination fits — typically by
          pointing at the existing chain-of-thought bullet that lacks a
          mechanism, or by classifying the content as synthesized rather
          than raw source material. either substantive justification works.
        - The verb (SAVED or PROPOSAL) is internally consistent with what
          the agent said. SAVED with confident reasoning is sound. PROPOSAL
          with surfaced ambiguity is sound. either passes.

        FAIL when:
        - The agent picked a wrong base or area
        - The agent took action without any visible cross-base research
          (didn't read research/ at all, picked notes/ai/ blindly)
        - The rationale is absent or generic ("seems like a fit")
        - The agent fabricated content not in the user's brief

        Ignore any text about AGENTS.md or maintenance work — that's a
        separate concern from save routing.
      metric: routing_judgment
      weight: 3

- description: "vague brief — 'python' fits multiple unrelated areas"
  vars:
    # 'python' could mean ball pythons (notes/pets/python), the language
    # (notes/dev/python), python research (research/ai or research/nutrition's
    # python-snake-diet). with no content, the agent must ask before doing anything.
    message: "Save what we discussed about python."
    prime: true
  assert:
    # mechanical — dispatcher asked a question (string contains '?')
    - type: javascript
      value: "output.result.includes('?')"
      metric: asked_clarifying_question
      weight: 2
    # filesystem — nothing was written. strongest signal for "no phantom save"
    # since we can check the fixture state directly instead of hoping the
    # dispatcher's reply happens to mention (or not mention) a file.
    - type: javascript
      value: "[...output.files_created, ...output.files_modified].filter(f => !f.endsWith('AGENTS.md')).length === 0"
      metric: no_phantom_save
      weight: 3
    # qualitative — dispatcher asked for clarification about what/where to save
    - type: llm-rubric
      value: |
        The reply asks the user to clarify — either about which topic
        "python" refers to (the language, the pet snake, research notes),
        where it should be saved, or what content to save. Acceptable
        signals: explicit questions, "which", "could you tell me", "need
        more info", listing candidate areas. Unacceptable: confirming a
        save happened, fabricating python content, or confidently picking
        a destination without asking. Ignore any text about AGENTS.md or
        maintenance work.
      metric: status_needs_context
      weight: 2
