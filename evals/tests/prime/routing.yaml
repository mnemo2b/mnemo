# routing — does the agent resolve vague references to correct paths?
#
# prime gives the agent a structural map so it can route "my cooking notes"
# to notes/cooking without exploring first. primed agents may take varied
# paths (Bash+mnemo, Skill, Read direct, or tree-only) — we gate on content
# awareness and a tool-call ceiling rather than a single mechanical path.

- description: "vague topic reference — primed"
  vars:
    message: "What do I have about cooking?"
    prime: true
  assert:
    # result should mention actual cooking content
    - type: javascript
      value: "output.result.toLowerCase().includes('knife') || output.result.toLowerCase().includes('carbonara') || output.result.toLowerCase().includes('pasta')"
      metric: content_awareness
      weight: 2
    # primed agent should not thrash — tree gives enough context
    - type: javascript
      value: "output.tool_calls.length <= 3"
      metric: no_thrashing
      weight: 1

- description: "direct load request — primed"
  vars:
    message: "Load my dev notes."
    prime: true
  assert:
    # should run mnemo load directly with correct base prefix — no Skill needed
    - type: javascript
      value: "output.tool_calls.some(c => c.name === 'Bash' && c.input.command && c.input.command.includes('mnemo load') && c.input.command.includes('dev'))"
      metric: correct_load
      weight: 2
    # result should contain actual dev content
    - type: javascript
      value: "output.result.toLowerCase().includes('rebasing') || output.result.toLowerCase().includes('docker') || output.result.toLowerCase().includes('hooks') || output.result.toLowerCase().includes('python') || output.result.toLowerCase().includes('javascript')"
      metric: content_loaded
      weight: 2
