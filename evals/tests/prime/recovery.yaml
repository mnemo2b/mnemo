# recovery — can the agent correct bad paths using the structural map?
#
# prime gives the agent enough context to fix typos and near-misses
# without a failed round trip.

- description: "misspelled path — primed"
  vars:
    message: "Load notes/cookin"
    prime: true
  assert:
    # should correct to notes/cooking
    - type: javascript
      value: "output.tool_calls.some(c => c.name === 'Bash' && c.input.command && c.input.command.includes('mnemo') && c.input.command.includes('notes/cooking'))"
      metric: path_corrected
      weight: 2
    # should not attempt the misspelled path as-is (cookin not followed by g)
    - type: javascript
      value: "!output.tool_calls.some(c => c.name === 'Bash' && c.input.command && /notes\\/cookin(?![a-z])/.test(c.input.command))"
      metric: no_bad_path_attempt
      weight: 1
