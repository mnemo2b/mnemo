# orientation — basic knowledge discovery
#
# primed agent may answer directly from the tree in prime context without
# calling mnemo — that's ideal, not a failure.

- description: "knowledge discovery — primed"
  vars:
    message: "What notes do I have?"
    prime: true
  assert:
    # result should reference actual fixture topics across bases
    - type: javascript
      value: "output.result.toLowerCase().includes('cooking') && output.result.toLowerCase().includes('dev')"
      metric: content_awareness
      weight: 2
