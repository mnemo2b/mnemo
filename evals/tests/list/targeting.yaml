# targeting — does the agent route user references to the right path?
#
# explicit "list" keyword asserts on list; vague discovery phrasing asserts
# only on reaching the target (agent may adaptively load a sparse dir).

- description: "exact path — primed"
  vars:
    message: "List my cooking notes."
    prime: true
  assert:
    # user said "list" — agent should list, not load
    - type: javascript
      value: "output.tool_input_text.includes('list notes/cooking')"
      metric: correct_list_target
      weight: 2
    # result should surface actual cooking subdirs (recipes, techniques, etc.)
    - type: javascript
      value: "output.result.toLowerCase().includes('recipes') || output.result.toLowerCase().includes('techniques') || output.result.toLowerCase().includes('gear')"
      metric: content_awareness
      weight: 2
    - type: javascript
      value: "output.tool_calls.length <= 3"
      metric: no_thrashing
      weight: 1

- description: "vague reference resolves to target — primed"
  vars:
    message: "What woodworking notes do I have?"
    prime: true
  assert:
    # agent may list OR adaptively load; assert only that it reached woodworking
    - type: javascript
      value: "output.tool_input_text.includes('woodworking')"
      metric: reached_target
      weight: 2
    # woodworking has a single basics.md — result should reference it
    - type: javascript
      value: "output.result.toLowerCase().includes('basics') || output.result.toLowerCase().includes('just started') || output.result.toLowerCase().includes('one note')"
      metric: content_awareness
      weight: 2
    - type: javascript
      value: "output.tool_calls.length <= 3"
      metric: no_thrashing
      weight: 1
